<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f5f6fa"/>
  <rect x="40" y="40" width="1120" height="620" rx="20" fill="#ffffff" stroke="#d9deea"/>
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1a2a4a">Step 3: Extract entry Keys from URL</text>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="24" fill="#32476b">Open generated pre-filled URL and match each value to its entry key.</text>

  <rect x="80" y="185" width="1040" height="430" rx="16" fill="#f8faff" stroke="#cfd8ec"/>
  <rect x="115" y="225" width="970" height="320" rx="12" fill="#111827"/>
  <text x="140" y="265" font-family="Courier New, monospace" font-size="18" fill="#a5f3fc">https://docs.google.com/forms/d/e/.../viewform?</text>
  <text x="140" y="300" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">entry.111111111=FN_TEST</text>
  <text x="140" y="332" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">&amp;entry.222222222=LN_TEST</text>
  <text x="140" y="364" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">&amp;entry.333333333=mail%40test.com</text>
  <text x="140" y="396" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">&amp;entry.444444444=COMP_TEST</text>
  <text x="140" y="428" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">&amp;entry.555555555=INQ_TEST</text>
  <text x="140" y="460" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">&amp;entry.666666666=QTY_TEST ...</text>

  <rect x="730" y="560" width="355" height="48" rx="10" fill="#e7eefc" stroke="#b8c7ec"/>
  <text x="750" y="592" font-family="Arial, sans-serif" font-size="20" fill="#2a4375">Copy only keys like: entry.111111111</text>
</svg>
