  <text x="130" y="262" font-family="Arial, sans-serif" font-size="22" fill="#1f3870">First Name</text>
  <rect x="115" y="292" width="420" height="48" rx="8" fill="#eef3ff" stroke="#b8c7ec"/>
  <text x="130" y="324" font-family="Arial, sans-serif" font-size="22" fill="#1f3870">Last Name</text>
  <rect x="115" y="354" width="420" height="48" rx="8" fill="#eef3ff" stroke="#b8c7ec"/>
  <text x="130" y="386" font-family="Arial, sans-serif" font-size="22" fill="#1f3870">Email</text>
  <rect x="115" y="416" width="420" height="48" rx="8" fill="#eef3ff" stroke="#b8c7ec"/>
  <text x="130" y="448" font-family="Arial, sans-serif" font-size="22" fill="#1f3870">Company</text>

  <rect x="630" y="230" width="420" height="48" rx="8" fill="#eef3ff" stroke="#b8c7ec"/>
