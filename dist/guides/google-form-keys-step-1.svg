  <text x="645" y="324" font-family="Arial, sans-serif" font-size="22" fill="#1f3870">Quantity</text>
  <rect x="630" y="354" width="420" height="48" rx="8" fill="#eef3ff" stroke="#b8c7ec"/>
  <text x="645" y="386" font-family="Arial, sans-serif" font-size="22" fill="#1f3870">Subject</text>
  <rect x="630" y="416" width="420" height="110" rx="8" fill="#eef3ff" stroke="#b8c7ec"/>
