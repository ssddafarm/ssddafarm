  <text x="80" y="145" font-family="Arial, sans-serif" font-size="24" fill="#32476b">Create fields that match your website contact form.</text>

  <rect x="80" y="185" width="1040" height="430" rx="16" fill="#f8faff" stroke="#cfd8ec"/>
