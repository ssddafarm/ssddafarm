<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f5f6fa"/>
  <rect x="40" y="40" width="1120" height="620" rx="20" fill="#ffffff" stroke="#d9deea"/>
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1a2a4a">Step 4: Put Keys in .env</text>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="24" fill="#32476b">Save mapping, restart server, submit test response.</text>

  <rect x="80" y="185" width="1040" height="430" rx="16" fill="#f8faff" stroke="#cfd8ec"/>
  <rect x="120" y="225" width="960" height="350" rx="12" fill="#0f172a"/>
  <text x="145" y="265" font-family="Courier New, monospace" font-size="18" fill="#86efac">GOOGLE_FORM_ACTION_URL=https://docs.google.com/forms/d/e/FORM_ID/formResponse</text>
  <text x="145" y="300" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_FIRST_NAME=entry.111111111</text>
  <text x="145" y="332" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_LAST_NAME=entry.222222222</text>
  <text x="145" y="364" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_EMAIL=entry.333333333</text>
  <text x="145" y="396" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_COMPANY=entry.444444444</text>
  <text x="145" y="428" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_INQUIRY_TYPE=entry.555555555</text>
  <text x="145" y="460" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_QUANTITY=entry.666666666</text>
  <text x="145" y="492" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_SUBJECT=entry.777777777</text>
  <text x="145" y="524" font-family="Courier New, monospace" font-size="18" fill="#93c5fd">GOOGLE_FORM_ENTRY_MESSAGE=entry.888888888</text>

  <rect x="860" y="592" width="260" height="44" rx="10" fill="#5a78d6"/>
  <text x="892" y="620" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Restart: npm run dev</text>
</svg>
